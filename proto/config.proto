syntax = "proto2";
package proto;

import "input.proto";
import "enums.proto";
import "device.proto";

message Profile {
  required uint32 uid = 1; 
  required FaceButtonMappingMode faceButtonMappingMode = 2;
  repeated Mapping mappings = 4;
  required string name = 5;
  required SubType deviceToEmulate = 6;
  repeated ProfileAssignment assignments = 8;
  repeated Led leds = 9;
}
message InputLedMapping {
  required Input input = 1;
  optional int32 min = 2;
  optional int32 max = 3;
}
message PatternLedMapping {

}
message StaticLedMapping {

}
message RGBLedDevice {
  required int32 deviceId = 1;
  optional int32 startR = 2;
  optional int32 startG = 3;
  optional int32 startB = 4;
  optional int32 endR = 6;
  optional int32 endG = 7;
  optional int32 endB = 8;
  optional int32 activeLed = 10;
}
message GpioLedDevice {
  required int32 pin = 1;
  required bool analog = 3;
}
message STP16CPCLedDevice {
  required int32 deviceId = 1;
  optional int32 activeLed = 2;
}
message Led {
  oneof led {
    InputLedMapping inputMapping = 1;
    PatternLedMapping patternMapping = 2;
    StaticLedMapping staticMapping = 3;
  }
  oneof device {
    RGBLedDevice rgb = 4;
    GpioLedDevice gpio = 5;
    STP16CPCLedDevice stp16 = 6;
  }
}

message SpecificUsbDevice {
  required uint32 vid = 1;
  required uint32 pid = 2;
}

message ProfileAssignmentInfo {
  oneof assignment {
    ConsoleType consoleType = 4;
    WiiExtType wiiExt = 5;
    PS2ControllerType ps2Cnt = 6;
    SubType usbType = 7;
    SpecificUsbDevice usbDevice = 8;
    bool catchall = 9;
    InputActivationTrigger input = 10; // Input at startup
    InputActivationTrigger inputAnyTime = 11; // Input at any time
    uint32 copilotProfile = 12; // copilot another profile
    uint32 midiChannel = 13;
  }
}

message ProfileAssignment {
  repeated ProfileAssignmentInfo assignments = 1;
}

message Config {
  repeated Device devices = 2;
  repeated Profile profiles = 3;
}

message ConfigInfo {
  required int32 dataSize = 1;
  required int32 dataCrc = 2;
  required int32 magic = 3;
}

message GetActiveProfiles {
  repeated int32 profiles = 1;
}
